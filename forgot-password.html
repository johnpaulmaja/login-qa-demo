<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: #f4f6fb;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        background: white;
        padding: 28px;
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(16, 24, 40, 0.08);
        width: min(420px, 100%);
      }
      h1 {
        margin-top: 0;
      }
      p {
        color: #374151;
      }
      a {
        color: #2563eb;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Forgot Password</h1>
      <p>
        To reset your password, contact your administrator or enter your account
        email.
      </p>
      <a href="index.html">Return to sign in</a>
    </section>
  </body>
</html>
